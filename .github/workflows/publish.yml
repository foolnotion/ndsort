name: Publish to PyPI

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  VCPKG_COMMIT: "d7112d1a4fb50410d3639f5f586972591d848beb"

jobs:
  build-linux:
    name: Linux x86_64
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: pypa/cibuildwheel@v2
        # vcpkg is bootstrapped inside the manylinux container by pyproject.toml
        # before-all; no host-side setup needed.

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux
          path: wheelhouse/*.whl

  build-macos:
    name: macOS arm64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install vcpkg
        uses: friendlyanon/setup-vcpkg@v1
        with: { committish: "${{ env.VCPKG_COMMIT }}" }

      - uses: actions/cache@v4
        with:
          path: ~/.cache/vcpkg/archives
          key: vcpkg-macos-arm64-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json') }}

      - uses: pypa/cibuildwheel@v2
        env:
          CIBW_ENVIRONMENT_MACOS: >
            CMAKE_ARGS="-DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake"
            VCPKG_BINARY_SOURCES="clear;files,$HOME/.cache/vcpkg/archives,readwrite"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos
          path: wheelhouse/*.whl

  build-windows:
    name: Windows x86_64
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install vcpkg
        uses: friendlyanon/setup-vcpkg@v1
        with: { committish: "${{ env.VCPKG_COMMIT }}" }

      - uses: actions/cache@v4
        with:
          path: C:\Users\runneradmin\AppData\Local\vcpkg\archives
          key: vcpkg-windows-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json') }}

      - uses: pypa/cibuildwheel@v2
        env:
          CIBW_ENVIRONMENT_WINDOWS: >
            CMAKE_ARGS="-DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake"
            VCPKG_BINARY_SOURCES="clear;files,C:/Users/runneradmin/AppData/Local/vcpkg/archives,readwrite"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows
          path: wheelhouse/*.whl

  publish:
    name: Publish to PyPI
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-24.04
    environment:
      name: pypi
      url: https://pypi.org/p/ndsort
    permissions:
      id-token: write  # OIDC trusted publishing — no API token required

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - uses: pypa/gh-action-pypi-publish@release/v1
